<svg xmlns="http://www.w3.org/2000/svg" width="600" height="120" viewBox="0 0 600 120">
  <!-- AD Interlock — Dark Edition — Final Wordmark   -->
  <!-- Andre Daniel Paredes                            -->
  <!-- Website header, email signature, deck covers   -->

  <!-- Dark background — remove rect for transparent  -->
  <rect width="600" height="120" fill="#0D1F28" rx="12"/>

  <!-- Mark -->
  <g transform="translate(60,60)">
    <path d="M-34,-48 L-34,48 Q38,48 38,0 Q38,-48 -34,-48 Z" fill="#1D7A65"/>
    <path d="M-22,-36 L-22,36 Q26,36 26,0 Q26,-36 -22,-36 Z" fill="#0D1F28"/>
    <rect x="-34" y="-48" width="12" height="96" fill="#1D7A65"/>
    <polygon points="2,-44 -24,48 -13,48 2,-10 17,48 28,48" fill="#5DCAA5"/>
    <rect x="-10" y="10" width="26" height="10" rx="3" fill="#5DCAA5"/>
  </g>

  <!-- Vertical divider -->
  <rect x="116" y="22" width="1.5" height="76" rx="1" fill="#1D4A3A"/>

  <!-- Name -->
  <text
    x="134" y="48"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    fill="#EAF6F4"
    letter-spacing="0.5">Andre Daniel</text>
  <text
    x="134" y="74"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    fill="#EAF6F4"
    letter-spacing="0.5">Paredes</text>

  <!-- Tagline -->
  <text
    x="135" y="96"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
    font-weight="400"
    fill="#5DCAA5"
    letter-spacing="2.8">PhD · BUILDING · IMPACT</text>
</svg>
