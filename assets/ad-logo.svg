<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- AD Interlock — Dark Edition — Production Logo -->
  <!-- Andre Daniel Paredes                          -->
  <!-- Use at 80px and above                         -->

  <!-- Dark background matching wordmark -->
  <rect width="400" height="400" fill="#0D1F28" rx="48"/>

  <g transform="translate(200,200)">
    <!-- D: forest teal on dark -->
    <path d="M-64,-120 L-64,120 Q100,120 100,0 Q100,-120 -64,-120 Z" fill="#1D7A65"/>
    <!-- D inner — uses dark bg color -->
    <path d="M-42,-90 L-42,90 Q70,90 70,0 Q70,-90 -42,-90 Z" fill="#0D1F28"/>
    <!-- D stem -->
    <rect x="-64" y="-120" width="22" height="240" fill="#1D7A65"/>
    <!-- A: mint, foreground -->
    <polygon points="4,-112 -60,120 -34,120 4,-24 42,120 68,120" fill="#5DCAA5"/>
    <!-- A crossbar -->
    <rect x="-24" y="24" width="68" height="18" rx="5" fill="#5DCAA5"/>
    <!-- Grounding accent line -->
    <rect x="-64" y="128" width="164" height="4" rx="2" fill="#5DCAA5" opacity="0.35"/>
  </g>
</svg>
