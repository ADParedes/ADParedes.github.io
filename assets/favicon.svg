<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- AD Interlock — Dark Edition — Favicon          -->
  <!-- Andre Daniel Paredes                            -->
  <!-- <link rel="icon" type="image/svg+xml"           -->
  <!--       href="/favicon.svg">                      -->

  <!-- Dark background -->
  <rect width="32" height="32" fill="#0D1F28" rx="6"/>

  <g transform="translate(16,16)">
    <!-- D: forest teal -->
    <path d="M-9,-14 L-9,14 Q11,14 11,0 Q11,-14 -9,-14 Z" fill="#1D7A65"/>
    <!-- D inner -->
    <path d="M-5,-10 L-5,10 Q7,10 7,0 Q7,-10 -5,-10 Z" fill="#0D1F28"/>
    <!-- D stem -->
    <rect x="-9" y="-14" width="4" height="28" fill="#1D7A65"/>
    <!-- A: mint -->
    <polygon points="1,-13 -7,14 -4,14 1,-3 6,14 9,14" fill="#5DCAA5"/>
    <!-- A crossbar -->
    <rect x="-3" y="3" width="8" height="3" rx="1" fill="#5DCAA5"/>
  </g>
</svg>
